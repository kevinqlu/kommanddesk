name: Backend CI

on:
  pull_request:
    branches: [main]
    paths:
      - 'apps/api/**'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Build with Maven
        working-directory: apps/api
        run: mvn clean compile -DskipTests